<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#111118">
<title>FPV Tools — OSD Font Editor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:#111118; --surface:#1c1c28; --card:#242433;
  --bg2:#0c0c14; --surface2:#171724;
  --chrome: rgba(14,14,26,0.92); --chrome2: rgba(14,14,26,0.86);
  --accent:#ff4d6d; --accent2:#7b5ea7;
  --text:#f0f0f8; --muted:#7a7a99;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --green:#22d3a8; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;
  background:radial-gradient(1100px 700px at 15% -10%, rgba(123,94,167,.28), transparent 60%),radial-gradient(1100px 700px at 85% -20%, rgba(255,77,109,.18), transparent 55%),linear-gradient(180deg, var(--bg), var(--bg2));
  color:var(--text); min-height:100vh; overscroll-behavior:none;
}
a{color:inherit}
button,input,select{font:inherit}
.ico{width:1em;height:1em;display:inline-block;vertical-align:-0.18em}
.header{
  background:linear-gradient(160deg, rgba(123,94,167,.22), var(--chrome) 55%, var(--chrome2));
  backdrop-filter:blur(18px); padding:calc(env(safe-area-inset-top,0px)+13px) 16px 13px;
  display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:200;
}
.header-icon{width:38px;height:38px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.4px;color:#fff}
.header-sub{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.main-wrap{padding:20px 16px}
.page-head{margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.page-head-icon{width:46px;height:46px;border-radius:14px;flex-shrink:0;background:linear-gradient(180deg, var(--card), rgba(36,36,51,.7));border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-top:2px}
.page-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
canvas{background:#0a0a14;border:1.5px solid var(--border);border-radius:12px;cursor:crosshair;max-width:100%}
.toolbar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.toolbar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px}
.toolbar button.active{background:var(--accent2);color:#fff;border-color:transparent}
.toolbar button.danger{background:var(--accent);color:#fff;border:none}
.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px}
#grid{display:grid;grid-template-columns:repeat(16, 1fr);gap:2px;margin-top:10px}
#grid canvas{width:32px;height:32px;cursor:pointer}
#grid canvas.selected{outline:2px solid var(--accent)}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/><path d="M10 12v-7h4v7"/></symbol>
</svg>

<div class="header">
  <div class="header-icon" role="button" tabindex="0" onclick="location.href='./'">
    <svg class="ico" style="width:20px;height:20px"><use href="#i-home"/></svg>
  </div>
  <div><div class="header-title">OSD <span>FONT</span></div>
    <div class="header-sub">Редактор шрифта MAX7456</div></div>
  <button onclick="location.href='./'" title="Вернуться в меню" style="margin-left:auto;width:38px;height:38px;border-radius:11px;border:none;background:rgba(255,255,255,.07);color:var(--text);cursor:pointer">
    <svg class="ico" style="width:20px;height:20px"><use href="#i-home"/></svg>
  </button>
</div>

<div class="main-wrap">
  <div class="page-head">
    <div class="page-head-icon" style="font-size:18px;">Aa</div>
    <div><div class="page-title">OSD Font Editor</div>
      <div class="page-desc">Редактор шрифта для MAX7456 OSD чипа</div></div>
  </div>

  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div><canvas id="glyph" width="288" height="432"></canvas></div>
    <div>
      <div class="label">Символ</div>
      <select id="glyphIndex" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)"></select>
      
      <div class="label" style="margin-top:12px">Цвет</div>
      <div style="display:flex;gap:8px">
        <button class="swatch active" data-v="2" style="background:#fff;width:28px;height:28px;border-radius:4px;border:1px solid var(--border)"></button>
        <button class="swatch" data-v="1" style="background:#888;width:28px;height:28px;border-radius:4px;border:1px solid var(--border)"></button>
        <button class="swatch" data-v="0" style="background:#000;width:28px;height:28px;border-radius:4px;border:1px solid var(--border)"></button>
      </div>
      
      <div class="label" style="margin-top:12px">Инструменты</div>
      <div class="toolbar" style="flex-direction:column">
        <button id="toolPencil" class="active">Карандаш</button>
        <button id="toolFill">Заливка</button>
        <button id="btnClear" class="danger">Очистить</button>
        <button id="btnSaveMCM">Сохранить .mcm</button>
      </div>
    </div>
  </div>

  <div class="label" style="margin-top:16px">Глифы</div>
  <div id="grid"></div>
</div>

<script>
const WIDTH = 288, HEIGHT = 432, COLS = 12, ROWS = 18;
let currentGlyph = new Uint8Array(WIDTH * ROWS);
let currentTool = 'pencil';
let currentColor = 2; // 0=black, 1=transparent, 2=white
let glyphs = {};

// Initialize empty glyphs
for (let i = 0; i < 256; i++) {
  glyphs[i] = new Uint8Array(WIDTH * ROWS);
}

const canvas = document.getElementById('glyph');
const ctx = canvas.getContext('2d');
const grid = document.getElementById('grid');
const glyphSelect = document.getElementById('glyphIndex');

// Populate glyph selector
for (let i = 0; i < 256; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = 'Глиф ' + i;
  glyphSelect.appendChild(opt);
}

// Create grid
for (let i = 0; i < 256; i++) {
  const c = document.createElement('canvas');
  c.width = 16; c.height = 18; c.dataset.index = i;
  c.style.imageRendering = 'pixelated';
  c.addEventListener('click', () => loadGlyph(i));
  grid.appendChild(c);
}

function drawGlyph() {
  const imgData = ctx.createImageData(WIDTH, ROWS);
  for (let x = 0; x < WIDTH; x++) {
    for (let y = 0; y < ROWS; y++) {
      const v = currentGlyph[y * WIDTH + x];
      const idx = (y * WIDTH + x) * 4;
      if (v === 2) { imgData.data[idx] = imgData.data[idx+1] = imgData.data[idx+2] = 255; imgData.data[idx+3] = 255; }
      else if (v === 1) { imgData.data[idx] = imgData.data[idx+1] = imgData.data[idx+2] = 0; imgData.data[idx+3] = 0; }
      else { imgData.data[idx] = imgData.data[idx+1] = imgData.data[idx+2] = 0; imgData.data[idx+3] = 255; }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function drawGrid() {
  const canvases = grid.querySelectorAll('canvas');
  canvases.forEach(c => {
    const idx = +c.dataset.index;
    const g = glyphs[idx];
    const gc = c.getContext('2d');
    const imgData = gc.createImageData(16, 18);
    for (let x = 0; x < 16; x++) {
      for (let y = 0; y < 18; y++) {
        const srcX = Math.floor(x * WIDTH / 16);
        const srcY = Math.floor(y * ROWS / 18);
        const v = g[srcY * WIDTH + srcX] || 0;
        const pidx = (y * 16 + x) * 4;
        imgData.data[pidx] = imgData.data[pidx+1] = imgData.data[pidx+2] = v === 2 ? 255 : 0;
        imgData.data[pidx+3] = v === 1 ? 0 : 255;
      }
    }
    gc.putImageData(imgData, 0, 0);
  });
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
let drawing = false;
function startDraw(e) {
  drawing = true;
  doDraw(e);
}
function doDraw(e) {
  if (!drawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * WIDTH / rect.width);
  const y = Math.floor((e.clientY - rect.top) * ROWS / rect.height);
  if (x < 0 || x >= WIDTH || y < 0 || y >= ROWS) return;
  if (currentTool === 'pencil') {
    currentGlyph[y * WIDTH + x] = currentColor;
  } else if (currentTool === 'fill') {
    const target = currentGlyph[y * WIDTH + x];
    floodFill(x, y, target, currentColor);
  }
  drawGlyph();
}
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

function floodFill(sx, sy, target, replace) {
  if (target === replace) return;
  const stack = [[sx, sy]];
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= WIDTH || y < 0 || y >= ROWS) continue;
    const idx = y * WIDTH + x;
    if (currentGlyph[idx] !== target) continue;
    currentGlyph[idx] = replace;
    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
  }
}

document.querySelectorAll('.swatch').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.swatch.active').classList.remove('active');
    btn.classList.add('active');
    currentColor = +btn.dataset.v;
  });
});

document.getElementById('toolPencil').addEventListener('click', () => {
  currentTool = 'pencil';
  document.getElementById('toolPencil').classList.add('active');
  document.getElementById('toolFill').classList.remove('active');
});
document.getElementById('toolFill').addEventListener('click', () => {
  currentTool = 'fill';
  document.getElementById('toolFill').classList.add('active');
  document.getElementById('toolPencil').classList.remove('active');
});
document.getElementById('btnClear').addEventListener('click', () => {
  currentGlyph.fill(0);
  drawGlyph();
});

glyphSelect.addEventListener('change', () => {
  const idx = +glyphSelect.value;
  loadGlyph(idx);
});

document.getElementById('btnSaveMCM').addEventListener('click', () => {
  const lines = [];
  for (let y = 0; y < ROWS; y++) {
    let row = '';
    for (let x = 0; x < WIDTH; x += 8) {
      let byte = 0;
      for (let i = 0; i < 8; i++) {
        if (currentGlyph[y * WIDTH + x + i] === 2) byte |= (1 << (7 - i));
      }
      row += ('0' + byte.toString(16)).slice(-2) + ' ';
    }
    lines.push(row.trim());
  }
  const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'font.mcm';
  a.click();
  URL.revokeObjectURL(url);
});

function loadGlyph(idx) {
  currentGlyph = glyphs[idx];
  drawGlyph();
  const canvases = grid.querySelectorAll('canvas');
  canvases.forEach(c => c.classList.remove('selected'));
  canvases[idx].classList.add('selected');
}

drawGlyph();
drawGrid();
</script>

</body>
</html>
