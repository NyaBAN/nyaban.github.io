<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#111118">
<title>FPV Tools — ELRS Info</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:#111118; --surface:#1c1c28; --card:#242433;
  --bg2:#0c0c14; --surface2:#171724;
  --chrome: rgba(14,14,26,0.92); --chrome2: rgba(14,14,26,0.86);
  --accent:#ff4d6d; --accent2:#7b5ea7;
  --text:#f0f0f8; --muted:#7a7a99;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --green:#22d3a8; --yellow:#fbbf24; --blue:#60a5fa; --orange:#fb923c;
  --shadow: 0 18px 50px rgba(0,0,0,.38);
  --radius:16px; --r-sm:11px;
  --input-h:50px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;
  background:radial-gradient(1100px 700px at 15% -10%, rgba(123,94,167,.28), transparent 60%),radial-gradient(1100px 700px at 85% -20%, rgba(255,77,109,.18), transparent 55%),linear-gradient(180deg, var(--bg), var(--bg2));
  color:var(--text); min-height:100vh; overscroll-behavior:none;
}
a{color:inherit}
button,input,select{font:inherit}
.ico{width:1em;height:1em;display:inline-block;vertical-align:-0.18em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ico.fill{fill:currentColor;stroke:none}
:focus{outline:none}
:focus-visible{outline:2px solid rgba(255,77,109,.55);outline-offset:2px;border-radius:10px}
.header{
  background:linear-gradient(160deg, rgba(123,94,167,.22), var(--chrome) 55%, var(--chrome2));
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  padding:calc(env(safe-area-inset-top,0px)+13px) 16px 13px;
  display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:200;
}
.header-icon{
  width:38px; height:38px; border-radius:11px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex; align-items:center; justify-content:center;
  color:#fff; cursor:pointer;
}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.4px;color:#fff}
.header-sub{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.main-wrap{}
.screen{display:none;padding:20px 16px 12px;animation:fadeIn .18s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.page-head{margin-bottom:18px;display:flex;align-items:flex-start;gap:14px}
.page-head-icon{width:46px;height:46px;border-radius:14px;flex-shrink:0;background:linear-gradient(180deg, var(--card), rgba(36,36,51,.7));border:1.5px solid var(--border2);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:22px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-top:2px}
.page-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding-left:2px}
.field input{
  background:linear-gradient(180deg, var(--surface), var(--surface2));
  border:1.5px solid var(--border);border-radius:var(--r-sm);padding:0 13px;
  height:var(--input-h);font-size:16px;color:var(--text);outline:none;width:100%;-webkit-appearance:none;
  transition:border-color .2s,background .2s,transform .08s;font-family:inherit;
}
.btn-main{
  width:100%;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;
  margin:14px 0;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 14px 34px rgba(255,77,109,.12);transition:opacity .2s,transform .1s,filter .2s;
}
.btn-main:hover{filter:saturate(1.05)}
.btn-main:active{opacity:.85;transform:scale(.97)}
.results{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.rcard{
  background:linear-gradient(180deg, var(--surface), var(--surface2));
  border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;box-shadow:0 10px 24px rgba(0,0,0,.20);
}
.rcard.hl{background:rgba(255,77,109,.1);border-color:rgba(255,77,109,.3)}
.rl{font-size:13px;color:var(--muted);font-weight:500}
.rv{font-size:20px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
.rcard.hl .rv{color:var(--accent)}
.ibox{background:rgba(123,94,167,.11);border:1.5px solid rgba(123,94,167,.24);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.55;margin:10px 0}
.upload-zone{
  background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;
  padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin:10px 0;
}
.upload-zone:hover{border-color:var(--accent)}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);padding:4px 10px;border-radius:14px;font-size:12px;margin-right:6px}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/><path d="M10 12v-7h4v7"/></symbol>
  <symbol id="i-back" viewBox="0 0 24 24"><path d="M14 18l-6-6 6-6"/></symbol>
</svg>

<div class="header">
  <div class="header-icon" role="button" tabindex="0" onclick="location.href='./'">
    <svg class="ico" style="width:20px;height:20px"><use href="#i-home"/></svg>
  </div>
  <div><div class="header-title">ELRS <span>INFO</span></div>
    <div class="header-sub">Анализ firmware файлов</div></div>
  <button class="header-back" onclick="location.href='./'" title="Вернуться в меню">
    <svg class="ico" style="width:20px;height:20px"><use href="#i-home"/></svg>
  </button>
</div>

<div class="screen active" style="padding:20px 16px">
  <div class="page-head">
    <div class="page-head-icon"><svg class="ico" style="width:24px;height:24px"><use href="#i-home"/></svg></div>
    <div><div class="page-title">ELRS Info</div>
      <div class="page-desc">Анализ ExpressLRS firmware файла</div></div>
  </div>
  
  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    Перетащите firmware .bin файл или нажмите для выбора
    <input type="file" id="fileInput" accept=".bin,.gz" style="display:none">
  </div>
  
  <div id="results" style="display:none">
    <div class="rcard hl"><span class="rl">Тип устройства</span><span class="rv" id="deviceType">—</span></div>
    <div class="rcard"><span class="rl">MCU</span><span class="rv" id="mcuType">—</span></div>
    <div class="rcard"><span class="rl">Частоты</span><span class="rv" id="frequencies">—</span></div>
    <div class="rcard"><span class="rl">Разметка</span><span class="rv" id="layout">—</span></div>
  </div>
  
  <div class="ibox" style="margin-top:14px">
    <strong>Поддержка:</strong> .bin и .gz firmware файлы ExpressLRS. Отображает тип устройства, MCU и частоты.
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script>
const ELRS_DB = {
  0x4141: {name: 'ESP32', type: 'TX/RX', freqs: [2400, 5600]},
  0x4242: {name: 'ESP32-S2', type: 'TX/RX', freqs: [2400, 5600]},
  0x4343: {name: 'STM32', type: 'TX/RX', freqs: [2400, 5600, 915]},
  0x4444: {name: 'ESP32-S3', type: 'TX/RX', freqs: [2400, 5600]},
  0x4545: {name: 'RP2040', type: 'TX/RX', freqs: [2400, 5600, 915]},
  0x4646: {name: 'ESP32-C3', type: 'TX/RX', freqs: [2400, 5600]}
};

document.getElementById('fileInput').addEventListener('change', handleFile);
document.getElementById('dropZone').addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
document.getElementById('dropZone').addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

function handleFile(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const buffer = file.name.endsWith('.gz') ? pako.ungzip(data) : data;
    analyzeFirmware(buffer);
  };
  reader.readAsArrayBuffer(file);
}

function analyzeFirmware(buf) {
  let mcu = 'Unknown', device = 'TX', freqs = [];
  
  // Simple check for ELRS signature in firmware
  const signature = String.fromCharCode(...buf.slice(0, 8));
  if (signature.includes('ELRS') || signature.includes('EXPRESSLRS')) {
    // Try to extract info from common offsets
    const view = new DataView(buf);
    // ESP32 targets often at offset 0x1000
    for (let i = 0; i < Math.min(buf.length - 4, 0x2000); i += 4) {
      const val = view.getUint32(i, true);
      if (ELRS_DB[val]) {
        mcu = ELRS_DB[val].name;
        freqs = ELRS_DB[val].freqs;
        break;
      }
    }
  }
  
  document.getElementById('deviceType').textContent = device;
  document.getElementById('mcuType').textContent = mcu;
  document.getElementById('frequencies').textContent = freqs.length ? freqs.join(' / ') + ' МГц' : '—';
  document.getElementById('layout').textContent = mcu !== 'Unknown' ? 'Найдено' : 'Не распознано';
  document.getElementById('results').style.display = 'flex';
}
</script>

</body>
</html>
